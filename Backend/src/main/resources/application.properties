spring.application.name=Backend
# Application
server.port=8080

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/smartos_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# CORS (allow frontend to connect)
cors.allowed-origins=http://localhost:3000,http://127.0.0.1:5500

# Logging
logging.level.com.smartos=DEBUG
logging.level.org.springframework.web=INFO